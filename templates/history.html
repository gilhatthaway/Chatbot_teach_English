<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử học - AI Learning Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        .modal-bg {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen">

    <!-- Header -->
    <div class="p-6 bg-blue-600 text-white flex justify-between items-center">
        <h2 class="text-2xl font-bold">📚 Lịch sử học</h2>

        <button onclick="window.location.href='/profile'" class="px-4 py-2 bg-gray-900 rounded-lg shadow">
            ← Quay lại trang cá nhân
        </button>
    </div>

    <div class="max-w-4xl mx-auto p-6">

        <!-- Tổng số bài học -->
        <div id="progress-box" class="text-xl font-semibold bg-white p-4 rounded-xl shadow mb-6">
            Đang tải tiến độ...
        </div>

        <!-- Biểu đồ -->
        <div class="bg-white p-6 rounded-xl shadow mb-8">
            <canvas id="historyChart" height="120"></canvas>
        </div>

        <h3 class="text-2xl font-bold mb-4">Danh sách bài học</h3>

        <div id="lesson-history">Đang tải...</div>
    </div>

    <!-- Modal xem chi tiết bài học -->
    <div id="detailModal" class="modal-bg">
        <div class="bg-white rounded-xl p-6 w-3/4 max-h-[80vh] overflow-auto">
            <h2 class="text-2xl font-bold mb-3">Chi tiết bài học</h2>

            <div id="detail-content" class="whitespace-pre-wrap"></div>

            <button onclick="closeModal()" class="mt-4 px-4 py-2 bg-blue-600 text-white rounded-lg shadow">
                Đóng
            </button>
        </div>
    </div>

    <script>
        function closeModal() {
            document.getElementById("detailModal").style.display = "none";
        }

        // Hàm format bài học từ JSON thành HTML
        function renderLesson(lesson) {
            let html = "";

            if (lesson.topic) {
                html += `<h2 class="text-xl font-bold mb-3">📘 Chủ đề: ${lesson.topic}</h2>`;
            }

            if (lesson.vocabulary) {
                html += `<h3 class="text-lg font-semibold mt-4">📚 Từ vựng</h3>`;
                lesson.vocabulary.forEach(v => {
                    html += `
                    <div class="p-3 bg-gray-100 rounded-lg mt-2">
                        <p><b>${v.word}</b> (${v.pronunciation})</p>
                        <p>${v.english_meaning}</p>
                        <p class="text-gray-500">→ ${v.vietnamese_meaning}</p>
                        <p class="italic mt-1">Ví dụ: ${v.example}</p>
                    </div>
                `;
                });
            }

            if (lesson.sentences) {
                html += `<h3 class="text-lg font-semibold mt-4">📝 Mẫu câu</h3>`;
                lesson.sentences.forEach(s => {
                    html += `
                    <div class="p-3 bg-gray-100 rounded-lg mt-2">
                        <p><b>${s.english}</b></p>
                        <p class="text-gray-500">→ ${s.vietnamese}</p>
                    </div>
                `;
                });
            }

            if (lesson.dialogue) {
                html += `<h3 class="text-lg font-semibold mt-4">💬 Hội thoại</h3>`;
                lesson.dialogue.forEach(line => {
                    html += `
                    <div class="mt-2">
                        <p><b>${line.person}:</b> ${line.english}</p>
                        <p class="text-gray-500">→ ${line.vietnamese}</p>
                    </div>
                `;
                });
            }

            if (lesson.exercises) {
                html += `<h3 class="text-lg font-semibold mt-4">🧠 Bài tập</h3>`;
                lesson.exercises.forEach((ex, i) => {
                    html += `
                    <div class="p-3 bg-gray-200 rounded-lg mt-2">
                        <p><b>Bài ${i + 1}:</b> ${ex.type}</p>
                        <p>${ex.question}</p>
                    </div>
                `;
                });
            }

            return html;
        }

        // Hàm được gọi khi bấm "Xem chi tiết"
        function showDetail(id_baihoc) {
            fetch(`/history/lesson/detail/${id_baihoc}`)
                .then(res => res.json())
                .then(data => {
                    console.log("DATA RETURN =", data);

                    const lesson = data.lesson;

                    if (!lesson) {
                        document.getElementById("detail-content").innerHTML =
                            "<p class='text-red-600'>Không có dữ liệu bài học.</p>";
                    } else if (lesson.raw) {
                        // trường hợp backend trả về { raw: "..."} khi không parse được JSON
                        document.getElementById("detail-content").textContent = lesson.raw;
                    } else {
                        document.getElementById("detail-content").innerHTML =
                            renderLesson(lesson);
                    }

                    document.getElementById("detailModal").style.display = "flex";
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById("detail-content").innerHTML =
                        "<p class='text-red-600'>Lỗi khi tải bài học.</p>";
                    document.getElementById("detailModal").style.display = "flex";
                });
        }

        function deleteLesson(id_baihoc) {
            if (!confirm("Bạn có chắc muốn xóa bài học này?")) return;

            fetch(`/history/lesson/delete/${id_baihoc}`, {
                    method: "DELETE"
                })
                .then(res => res.json())
                .then(data => {
                    alert(data.message);
                    loadHistory();
                    loadProgress();
                    loadChart();
                });
        }

        function loadHistory() {
            const userId = localStorage.getItem("id_nguoi_dung");

            fetch(`/history/lesson/${userId}`)
                .then(res => res.json())
                .then(data => {

                    const box = document.getElementById("lesson-history");
                    let html = "";

                    if (!data.history || data.history.length === 0) {
                        box.innerHTML = "Bạn chưa có bài học nào.";
                        return;
                    }

                    data.history.forEach(h => {
                        html += `
                        <div class="bg-white shadow p-4 rounded-xl mb-3">
                            <h3 class="text-lg font-semibold text-blue-700">📘 ${h.chu_de}</h3>
                            <p class="text-gray-600 text-sm">🕒 ${h.ngay_tao}</p>

                            <button onclick="showDetail(${h.id_baihoc})"
                                class="mt-2 px-4 py-2 bg-blue-600 text-white rounded-lg shadow">
                                Xem chi tiết
                            </button>

                            <button onclick="deleteLesson(${h.id_baihoc})"
                                class="mt-2 ml-2 px-4 py-2 bg-red-600 text-white rounded-lg shadow">
                                Xóa
                            </button>
                        </div>
                    `;
                    });

                    box.innerHTML = html;
                });
        }

        function loadProgress() {
            const userId = localStorage.getItem("id_nguoi_dung");

            fetch(`/history/lesson/count/${userId}`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById("progress-box").innerText =
                        `Bạn đã học tổng cộng: ${data.total} bài 🎉`;
                });
        }

        function loadChart() {
            const userId = localStorage.getItem("id_nguoi_dung");

            fetch(`/history/lesson/chart/${userId}`)
                .then(res => res.json())
                .then(data => {
                    const labels = data.chart.map(x => x.date);
                    const values = data.chart.map(x => x.total);

                    new Chart(document.getElementById("historyChart"), {
                        type: "line",
                        data: {
                            labels: labels,
                            datasets: [{
                                label: "Số bài học theo ngày",
                                data: values,
                                borderWidth: 3
                            }]
                        }
                    });
                });
        }

        document.addEventListener("DOMContentLoaded", () => {
            loadHistory();
            loadProgress();
            loadChart();
        });
    </script>


</body>

</html>
