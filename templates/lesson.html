<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Tập Tiếng Anh - Family</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-in { animation: fadeIn 0.45s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .tab-active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .pronunciation { color: #e53e3e; font-style: italic; }
        .exercise-option:hover { transform: translateY(-2px); }
        .order-word { transition: all 0.2s ease; }
        .order-word:hover { transform: scale(1.05); }

        /* Modern chat layout styles (Messenger / Zalo-like) */
        #conversationList { padding: 18px; background: linear-gradient(180deg,#f8fafc 0,#ffffff 100%); min-height: 420px; overflow: hidden; }
        .chat-scroller { display: flex; flex-direction: column; gap: 12px; max-height: 700px; overflow-y: auto; padding-bottom: 12px; }

        .message-row { display: flex; align-items: flex-end; gap: 12px; width: 100%; }
        .message-row.left { justify-content: flex-start; }
        .message-row.right { justify-content: flex-end; }

        .avatar { width: 44px; height: 44px; border-radius: 9999px; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; color: #fff; box-shadow: 0 4px 14px rgba(2,6,23,0.08); flex-shrink: 0; }
        .avatar.bot { background: #2563eb; }
        .avatar.user { background: #6b7280; }

        .bubble { max-width: 72%; padding: 12px 14px; border-radius: 18px; font-size: 15px; line-height: 1.4; box-shadow: 0 8px 24px rgba(2,6,23,0.06); position: relative; word-break: break-word; }
        .bubble.left { background: #ffffff; color: #0f172a; border: 1px solid rgba(15,23,42,0.06); border-top-left-radius: 6px; }
        .bubble.right { background: #0078ff; color: #fff; border: 1px solid rgba(0,0,0,0.04); border-top-right-radius: 6px; }

        /* subtle tail */
        .bubble.left::after, .bubble.right::after { content: ''; position: absolute; bottom: -6px; width: 12px; height: 12px; transform: rotate(45deg); }
        .bubble.left::after { left: 18px; background: #ffffff; border-left: 1px solid rgba(15,23,42,0.06); border-bottom: 1px solid rgba(15,23,42,0.06); }
        .bubble.right::after { right: 18px; background: #0078ff; }

        .bubble .text { margin-bottom: 6px; font-weight: 500; }
        .bubble .translation { font-size: 13px; color: rgba(15,23,42,0.6); }

        .msg-meta { margin-top: 6px; display: flex; gap: 8px; align-items: center; font-size: 12px; color: rgba(15,23,42,0.5); }
        .msg-meta .speaker { font-weight: 600; color: rgba(15,23,42,0.75); }

        /* small responsive adjustments */
        @media (max-width: 768px) {
            .bubble { max-width: 86%; font-size: 15px; padding: 10px 12px; }
            .avatar { width: 36px; height: 36px; }
        }
    </style>
</head>

<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">📚 Bài Tập Tiếng Anh</h1>
            <p class="text-gray-600">Học từ vựng và hội thoại về mọi chủ đề bạn thích</p>

            <!-- Nút quay về trang chủ -->
            <a href="/home" class="fixed top-4 left-4 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg shadow-lg font-medium transition-colors z-50">
    ⬅️ Trang chủ
</a>

            <!-- User Info + Logout (cố định góc trên phải) -->
            <div class="fixed top-4 right-4 flex items-center space-x-3 z-50">
                <!-- Avatar -->
                <img id="lessonAvatar" src="https://cdn-icons-png.flaticon.com/512/847/847969.png" class="w-10 h-10 rounded-full object-cover border-2 border-white shadow cursor-pointer" onclick="window.location.href='/profile'" alt="avatar">

                <!-- Tên -->
                <span class="text-black font-medium text-sm" id="usernameDisplay">Khách</span>

                <!-- Logout -->

        Đăng xuất
    </button>
            </div>


            <script>
                document.addEventListener("DOMContentLoaded", () => {
                    const ten_dang_nhap = localStorage.getItem("ten_dang_nhap");
                    const vai_tro = localStorage.getItem("vai_tro") || "Người dùng";
                    const id_nguoi_dung = localStorage.getItem("id_nguoi_dung");

                    if (!ten_dang_nhap) {
                        alert("❌ Bạn chưa đăng nhập. Vui lòng login trước khi sử dụng tính năng này.");

        </div>

        <!-- Topic Input Section -->
        <div class="bg-white rounded-xl shadow-lg p-6 mb-8">
            <h2 class="text-xl font-semibold mb-4 text-gray-800">📚 Tạo Bài Học Mới</h2>
            <div class="mb-4">

                <div class="flex gap-4">
                    <input type="text" id="topicInput" placeholder="Ví dụ: Family, Food, Animals, School..." class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" onkeypress="if(event.key==='Enter') generateLesson()">

            </div>
            <div class="mb-4">
                <div class="bg-gray-100 p-3 rounded-lg">

                </div>
            </div>
            <button onclick="loadSampleData()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg font-medium transition-colors">
                📝 Sử dụng mẫu Family
            </button>
        </div>

        <!-- Loading State -->
        <div id="loading" class="hidden text-center py-8">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
            <p class="mt-2 text-gray-600">Đang tải dữ liệu...</p>
        </div>

        <!-- Error State -->
        <div id="error" class="hidden bg-red-50 border border-red-200 rounded-lg p-4 mb-6">

        <!-- Main Content -->
        <div id="content" class="hidden">
            <!-- Navigation Tabs -->
            <div class="flex flex-wrap gap-2 mb-6 bg-white rounded-xl p-2 shadow-lg">
                <button onclick="showTab('vocabulary')" id="tab-vocabulary" class="tab-active px-6 py-3 rounded-lg font-medium transition-all">

                </button>
                <button onclick="showTab('examples')" id="tab-examples" class="px-6 py-3 rounded-lg font-medium transition-all hover:bg-gray-100">
                    💡 Ví Dụ
                </button>
                <button onclick="showTab('conversation')" id="tab-conversation" class="px-6 py-3 rounded-lg font-medium transition-all hover:bg-gray-100">
                    💬 Hội Thoại
                </button>
                <button onclick="showTab('exercises')" id="tab-exercises" class="px-6 py-3 rounded-lg font-medium transition-all hover:bg-gray-100">
                    🎯 Bài Tập
                </button>
            </div>

            <!-- Vocabulary Tab -->
            <div id="vocabulary-content" class="tab-content">
                <div class="grid gap-4 md:grid-cols-2 lg:grid-cols-3" id="vocabularyList">
                    <!-- Vocabulary cards will be inserted here -->

            </div>

            <!-- Examples Tab -->
            <div id="examples-content" class="tab-content hidden">

            </div>

            <!-- Conversation Tab -->
                <div id="conversation-content" class="tab-content hidden">
            <div class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
                <!-- Header của khung chat -->
                <div class="bg-blue-600 p-4 text-white text-center">
                    <h3 class="text-xl font-bold">🗣️ Hội Thoại Thực Tế</h3>
                    <p class="text-blue-100 text-sm">Nhấn vào biểu tượng loa để nghe phát âm</p>
                </div>
                
                <!-- Danh sách chat - Tăng chiều rộng ở đây -->
                <div class="max-w-4xl mx-auto w-full"> 
                    <div class="bg-gray-50 min-h-[500px] max-h-[700px] overflow-y-auto" id="conversationList">
                        <!-- Nội dung chat sẽ được JS đổ vào đây -->
                    </div>
                </div>
            </div>
        </div>

            <!-- Exercises Tab -->
            <div id="exercises-content" class="tab-content hidden">
                <div class="bg-gradient-to-br from-purple-50 via-white to-pink-50 rounded-2xl shadow-xl p-8">
                    <div class="max-w-2xl mx-auto">
                        <h3 class="text-2xl font-bold mb-2 text-gray-800 text-center">✏️ Bài Tập Luyện Tập</h3>
                        <p class="text-center text-gray-600 mb-6">Luyện tập để cải thiện kỹ năng tiếng Anh của bạn</p>
                        <div class="space-y-6" id="exercisesList">
                            <!-- Exercises will be generated here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let lessonData = null;

        // Sample data matching the backend structure
        const sampleData = {
            "topic": "Family",
            "vocabulary": [{
                "word": "Family",
                "pronunciation": "/ˈfæməli/",

            }, {

            }, {

                "english_meaning": "A female sibling.",

            }],
            "example_sentences": [{
                "english": "My family is very important to me.",
                "translation": "Gia đình của tôi rất quan trọng đối với tôi."
            }, {
                "english": "We love spending time with our family.",
                "translation": "Chúng tôi thích dành thời gian cho gia đình của mình."
            }, {

                "translation": "Mẹ tôi nấu những món ăn ngon cho chúng tôi."
            }, {
                "english": "My father helps me with homework.",
                "translation": "Bố tôi giúp tôi làm bài tập về nhà."
            }, {
                "english": "I play football with my brother every weekend.",
                "translation": "Tôi chơi bóng đá với anh trai mỗi cuối tuần."
            }],
            "conversation": [{
                "speaker": "Person A",
                "text": "Hi! How many people are there in your family?",
                "translation": "Chào bạn! Gia đình bạn có bao nhiêu người?"
            }, {
                "speaker": "Person B",
                "text": "There are four people in my family: my parents, my brother, and me.",
                "translation": "Gia đình tôi có bốn người: bố mẹ tôi, anh trai tôi và tôi."
            }, {
                "speaker": "Person A",
                "text": "That's nice! What does your father do for work?",
                "translation": "Tuyệt vời! Bố bạn làm nghề gì?"
            }, {
                "speaker": "Person B",
                "text": "My father is a teacher. He works at a school near our house.",
                "translation": "Bố tôi là giáo viên. Ông ấy làm việc ở một trường học gần nhà chúng tôi."
            }, {
                "speaker": "Person A",
                "text": "That's great! And what about your mother?",
                "translation": "Thật tuyệt! Còn mẹ bạn thì sao?"
            }, {
                "speaker": "Person B",
                "text": "My mother is a doctor. She works at the hospital.",
                "translation": "Mẹ tôi là bác sĩ. Bà ấy làm việc ở bệnh viện."
            }, {
                "speaker": "Person A",
                "text": "Wow! Your family sounds amazing. I love my family too!",
                "translation": "Wow! Gia đình bạn nghe thật tuyệt vời. Tôi cũng rất yêu gia đình của mình!"
            }, {
                "speaker": "Person B",
                "text": "Thank you! Family is the most important thing in life.",
                "translation": "Cảm ơn bạn! Gia đình là điều quan trọng nhất trong cuộc sống."
            }],
            "exercises": [{
                "type": "fill_in_blank",
                "question": "I love my _____ very much.",
                "options": ["family", "school", "car", "book"],
                "answer": "family"
            }, {
                "type": "fill_in_blank",
                "question": "My _____ is a teacher.",
                "options": ["father", "mother", "brother", "sister"],
                "answer": "mother"
            }, {
                "type": "fill_in_blank",
                "question": "I play football with my _____ every weekend.",
                "options": ["sister", "brother", "mother", "father"],
                "answer": "brother"
            }, {
                "type": "sentence_order",
                "scrambled": ["my", "family", "I", "love", "very", "much"],
                "answer": "I love my family very much."
            }, {
                "type": "sentence_order",
                "scrambled": ["mother", "my", "is", "teacher", "a"],
                "answer": "My mother is a teacher."
            }, {
                "type": "sentence_order",
                "scrambled": ["father", "works", "my", "hospital", "in", "a"],
                "answer": "My father works in a hospital."
            }, {
                "type": "make_sentence",
                "word": "family",
                "example": "I love my family very much."
            }, {
                "type": "make_sentence",
                "word": "brother",
                "example": "I have one brother."
            }, {
                "type": "make_sentence",
                "word": "sister",
                "example": "My sister is very kind."
            }]
        };

        function normalizeLessonData(data, fallbackTopic = "") {
            let payload = {};
            if (data && data.lesson) {
                payload = data.lesson;
            } else if (data) {
                payload = data;
            }



            if (!payload || typeof payload !== 'object') {
                return {
                    topic: fallbackTopic,
                    vocabulary: [],
                    example_sentences: [],
                    conversation: [],
                    exercises: []
                };
            }

            return {
                topic: payload.topic || fallbackTopic || "Chủ đề",
                vocabulary: Array.isArray(payload.vocabulary) ? payload.vocabulary : [],
                example_sentences: Array.isArray(payload.example_sentences) ? payload.example_sentences : [],
                conversation: Array.isArray(payload.conversation) ? payload.conversation : [],
                exercises: Array.isArray(payload.exercises) ? payload.exercises : []
            };
        }
        async function generateLesson() {
            const topic = document.getElementById('topicInput').value.trim();
            const id_nguoi_dung = localStorage.getItem("id_nguoi_dung"); // 🔹 Lấy id_nguoi_dung từ localStorage

            if (!topic) {
                showError('Vui lòng nhập chủ đề bạn muốn học');
                return;
            }
            if (!id_nguoi_dung) {
                showError('Thiếu thông tin người dùng, vui lòng đăng nhập lại!');
                return;
            }

            showLoading(true);
            hideError();

            try {
                // Gọi API POST thay vì GET
                const response = await fetch(`http://localhost:5000/generate/lesson/${encodeURIComponent(topic)}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                            id_nguoi_dung
                        }) // 🔹 Gửi id_nguoi_dung trong body
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                console.log('📊 Received data:', data);

                lessonData = normalizeLessonData(data, topic);
                displayLessonData();
                showLoading(false);

                // Update header with the topic
                document.querySelector('h1').textContent = `📚 Bài Tập Tiếng Anh - ${topic}`;

            } catch (error) {
                showLoading(false);
                showError(`Lỗi khi tạo bài học: ${error.message}`);
                console.error('Generate lesson error:', error);
            }
        }


        // Hiển thị username từ localStorage
        document.addEventListener("DOMContentLoaded", () => {
            const ten_dang_nhap = localStorage.getItem("ten_dang_nhap") || "Khách";
            const vai_tro = localStorage.getItem("role") || "Người dùng";
            document.getElementById("usernameDisplay").textContent = ten_dang_nhap;
        });

        // Xử lý logout
        document.getElementById("logoutBtn").addEventListener("click", () => {
            localStorage.removeItem("ten_dang_nhap");
            localStorage.removeItem("vai_tro");
            localStorage.removeItem("id_nguoi_dung");
            window.location.href = "/login";
        });

        function loadSampleData() {
            lessonData = sampleData;
            displayLessonData();
            hideError();
        }

        function displayLessonData() {
            if (!lessonData) return;

            document.getElementById('content').classList.remove('hidden');

            displayVocabulary();
            displayExamples();
            displayConversation();
            displayExercises();
        }

        function displayVocabulary() {
            const container = document.getElementById('vocabularyList');
            container.innerHTML = '';

            if (!lessonData || !lessonData.vocabulary || !Array.isArray(lessonData.vocabulary)) {
                container.innerHTML = '<p class="text-gray-600 text-center">Không có từ vựng nào.</p>';
                return;
            }

            lessonData.vocabulary.forEach((item, index) => {
                        const card = document.createElement('div');
                        card.className = 'bg-white rounded-xl shadow-lg p-6 hover:shadow-xl transition-shadow fade-in';
                        card.style.animationDelay = `${index * 0.1}s`;

                        card.innerHTML = `
                    <div class="text-center">
                        <h3 class="text-2xl font-bold text-blue-600 mb-2">${item.word}</h3>
                        ${item.pronunciation ? `<p class="pronunciation text-sm mb-3">${item.pronunciation}</p>` : ''}
                        <div class="border-t pt-3">
                            <p class="text-gray-700 mb-2 text-sm">${item.english_meaning}</p>
                            <p class="text-lg font-semibold text-green-600">${item.vietnamese_meaning}</p>
                            ${item.example ? `<p class="text-sm text-blue-600 mt-2 italic">"${item.example}"</p>` : ''}
                        </div>
                        <button onclick="speakWord('${item.word}')" class="mt-3 bg-blue-100 hover:bg-blue-200 text-blue-700 px-3 py-1 rounded-full text-sm transition-colors">
                            🔊 Phát âm
                        </button>
                    </div>
                `;
                
                container.appendChild(card);
            });
        }

        function displayExamples() {
            const container = document.getElementById('examplesList');
            container.innerHTML = '';

            if (!lessonData || !lessonData.example_sentences || !Array.isArray(lessonData.example_sentences)) {
                container.innerHTML = '<p class="text-gray-600 text-center">Không có ví dụ nào.</p>';
                return;
            }

            lessonData.example_sentences.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-xl shadow-lg p-6 fade-in';
                card.style.animationDelay = `${index * 0.1}s`;
                
                card.innerHTML = `
                    <div class="flex items-start gap-4">
                        <div class="bg-blue-100 text-blue-600 rounded-full w-8 h-8 flex items-center justify-center font-bold text-sm">
                            ${index + 1}
                        </div>
                        <div class="flex-1">
                            <p class="text-lg text-gray-800 mb-2">"${item.english}"</p>
                            <p class="text-gray-600 italic">${item.translation}</p>
                            <button onclick="speakSentence('${item.english.replace(/'/g, "\\'")}')" class="mt-2 bg-green-100 hover:bg-green-200 text-green-700 px-3 py-1 rounded-full text-sm transition-colors">
                                🔊 Nghe câu
                            </button>
                        </div>
                    </div>
                `;
                
                container.appendChild(card);
            });
        }

    function displayConversation() {
    const container = document.getElementById('conversationList');
    container.innerHTML = '';

    if (!lessonData || !lessonData.conversation || !Array.isArray(lessonData.conversation) || lessonData.conversation.length === 0) {
        container.innerHTML = '<p class="text-gray-600 text-center py-20">Không có dữ liệu hội thoại.</p>';
        return;
    }

    const scroller = document.createElement('div');
    scroller.className = 'chat-scroller';

    // Build speakers list to alternate sides (first speaker = left)
    const speakers = [];
    lessonData.conversation.forEach(item => { if (item && item.speaker && !speakers.includes(item.speaker)) speakers.push(item.speaker); });

    lessonData.conversation.forEach((item, index) => {
        const englishText = (item.english_line || item.text || '').toString();
        const vietnameseText = (item.vietnamese_translation || item.translation || '').toString();
        const speakerName = item.speaker || 'Người nói';

        const isLeft = speakers.indexOf(speakerName) === 0;

        const row = document.createElement('div');
        row.className = `message-row ${isLeft ? 'left' : 'right'} fade-in`;
        row.style.animationDelay = `${index * 0.06}s`;

        // compute a simple initial for avatar
        const initial = speakerName.trim().charAt(0).toUpperCase() || 'U';
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        if (isLeft) {
            row.innerHTML = `
                <div class="avatar bot" title="${speakerName}">${initial}</div>
                <div class="bubble left">
                    <div class="text">${englishText}</div>
                    ${vietnameseText ? `<div class="translation">${vietnameseText}</div>` : ''}
                    <div class="msg-meta"><span class="speaker">${speakerName}</span><span class="time">${time}</span></div>
                </div>
            `;
        } else {
            row.innerHTML = `
                <div class="bubble right">
                    <div class="text">${englishText}</div>
                    ${vietnameseText ? `<div class="translation">${vietnameseText}</div>` : ''}
                    <div class="msg-meta"><span class="time">${time}</span><span class="speaker">${speakerName}</span></div>
                </div>
                <div class="avatar user" title="${speakerName}">${initial}</div>
            `;
        }

        scroller.appendChild(row);
    });

    container.appendChild(scroller);

    // auto-scroll to bottom
    setTimeout(() => { container.scrollTop = container.scrollHeight; }, 80);
}

                    exerciseHTML = `

        function checkFillAnswer(selected, correct, button) {
            const allButtons = button.parentElement.querySelectorAll('.exercise-option');
            allButtons.forEach(btn => {
                btn.disabled = true;
                if (btn.textContent.trim() === correct) {
                    btn.className = 'exercise-option bg-green-500 text-white px-4 py-2 rounded-lg text-sm';
                } else if (btn.textContent.trim() === selected && selected !== correct) {
                    btn.className = 'exercise-option bg-red-500 text-white px-4 py-2 rounded-lg text-sm';
                }
            });
        }

        function selectWordForSentence(wordElement, exerciseIndex) {
            const orderContainer = document.getElementById(`sentence-order-${exerciseIndex}`);
            const word = wordElement.dataset.word;
            const wordBank = document.getElementById(`word-bank-${exerciseIndex}`);
            
            // Tạo phần tử từ đã chọn
            const selectedWordSpan = document.createElement('span');
            selectedWordSpan.className = 'bg-gradient-to-r from-blue-600 to-blue-700 text-white px-4 py-2 rounded-lg text-sm font-bold cursor-pointer transition-all hover:shadow-lg shadow-md order-word';
            selectedWordSpan.textContent = word;
            selectedWordSpan.dataset.word = word;
            
            // Thêm nút xóa
            const removeBtn = document.createElement('button');
            removeBtn.className = 'ml-2 text-white font-bold hover:text-red-200';
            removeBtn.textContent = '✕';
            removeBtn.onclick = function(e) {
                e.stopPropagation();
                selectedWordSpan.remove();
                // Đánh dấu từ gốc lại thành bình thường
                const originalWord = wordBank.querySelector(`[data-word="${word}"]`);
                if (originalWord) {
                    originalWord.classList.remove('opacity-50');
                }
            };
            selectedWordSpan.appendChild(removeBtn);
            
            // Click để xóa
            selectedWordSpan.onclick = function() {
                selectedWordSpan.remove();
                const originalWord = wordBank.querySelector(`[data-word="${word}"]`);
                if (originalWord) {
                    originalWord.classList.remove('opacity-50');
                }
            };
            
            // Đánh dấu từ gốc là đã chọn (sáng đầu)
            wordElement.classList.add('opacity-50');
            
            orderContainer.appendChild(selectedWordSpan);
        }

        function resetSentenceOrder(exerciseIndex) {
            const orderContainer = document.getElementById(`sentence-order-${exerciseIndex}`);
            const resultDiv = document.getElementById(`result-${exerciseIndex}`);
            const answerDiv = document.getElementById(`answer-${exerciseIndex}`);
            
            orderContainer.innerHTML = '';
            resultDiv.classList.add('hidden');
            answerDiv.classList.add('hidden');
        }

        function checkSentenceOrder(correctAnswer, exerciseIndex) {
            const orderContainer = document.getElementById(`sentence-order-${exerciseIndex}`);
            const selectedWords = orderContainer.querySelectorAll('.order-word');
            const userAnswer = Array.from(selectedWords).map(word => {
                const text = word.textContent;
                return text.replace('✕', '').trim();
            }).join(' ').trim();
            
            const resultDiv = document.getElementById(`result-${exerciseIndex}`);
            const answerDiv = document.getElementById(`answer-${exerciseIndex}`);
            
            resultDiv.classList.remove('hidden');
            
            // Bỏ qua dấu câu và khoảng trắng khi so sánh
            const normalizeText = (text) => {
                return text
                    .toLowerCase()
                    .replace(/[.,!?;:\-]/g, '')  // Bỏ dấu câu
                    .replace(/\s+/g, ' ')         // Chuẩn hóa khoảng trắng
                    .trim();
            };
            
            const userAnswerNormalized = normalizeText(userAnswer);
            const correctAnswerNormalized = normalizeText(correctAnswer);
            
            if (userAnswerNormalized === correctAnswerNormalized) {
                resultDiv.className = 'mt-4 hidden p-3 rounded-lg text-sm bg-green-100 border border-green-400 text-green-700';
                resultDiv.innerHTML = '✅ <strong>Chính xác!</strong> Câu của bạn đúng rồi!';
                resultDiv.classList.remove('hidden');
            } else {
                resultDiv.className = 'mt-4 hidden p-3 rounded-lg text-sm bg-red-100 border border-red-400 text-red-700';
                resultDiv.innerHTML = `❌ <strong>Chưa đúng.</strong> Bạn viết: "${userAnswer}"`;
                resultDiv.classList.remove('hidden');
                answerDiv.classList.remove('hidden');
            }
        }


        function checkMakeSentence(example, exerciseIndex) {
            const input = document.getElementById(`sentence-input-${exerciseIndex}`);
            const resultDiv = document.getElementById(`result-${exerciseIndex}`);
            const resultMessage = document.getElementById(`result-message-${exerciseIndex}`);
            const resultAnswer = document.getElementById(`result-answer-${exerciseIndex}`);
            
            if (input.value.trim()) {
                resultDiv.classList.remove('hidden');
                resultMessage.innerHTML = '✅ Tốt! Bạn đã tạo được một câu. Dưới đây là ví dụ từ bài học:';
                resultAnswer.innerHTML = `<strong class="text-purple-700">"${example}"</strong>`;
                input.disabled = true;
            } else {
                resultDiv.classList.add('hidden');
            }
        }

        function resetMakeSentence(exerciseIndex) {
            const input = document.getElementById(`sentence-input-${exerciseIndex}`);
            const resultDiv = document.getElementById(`result-${exerciseIndex}`);
            
            input.value = '';
            input.disabled = false;
            resultDiv.classList.add('hidden');
            input.focus();
        }

        function speakWord(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                speechSynthesis.speak(utterance);
            }
        }

        function speakSentence(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                speechSynthesis.speak(utterance);
            }
        }

        function showTab(tabName) {
            // Hide all tab contents
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.add('hidden');
            });
            
            // Remove active class from all tabs
            document.querySelectorAll('[id^="tab-"]').forEach(tab => {
                tab.className = 'px-6 py-3 rounded-lg font-medium transition-all hover:bg-gray-100';
            });
            
            // Show selected tab content
            document.getElementById(`${tabName}-content`).classList.remove('hidden');
            
            // Add active class to selected tab
            document.getElementById(`tab-${tabName}`).className = 'tab-active px-6 py-3 rounded-lg font-medium transition-all';
        }

        function showLoading(show) {
            document.getElementById('loading').classList.toggle('hidden', !show);
        }

        function showError(message) {
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('error').classList.remove('hidden');
        }

        function hideError() {
            document.getElementById('error').classList.add('hidden');
        }

        // Initialize with sample data
        window.addEventListener('load', () => {
            loadSampleData();
        });
    </script>
