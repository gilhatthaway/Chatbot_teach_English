<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>WebRTC Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>video{width:100%;height:auto;background:#000}</style>
</head>
<body class="p-6 bg-gray-50">
  <div class="max-w-3xl mx-auto bg-white p-4 rounded shadow">
    <h1 class="text-xl font-semibold mb-3">WebRTC Voice Demo</h1>
    <div class="grid grid-cols-2 gap-3">
      <div>
        <h3 class="text-sm">Local</h3>
        <video id="localVideo" autoplay playsinline muted></video>
      </div>
      <div>
        <h3 class="text-sm">Remote</h3>
        <video id="remoteVideo" autoplay playsinline></video>
      </div>
    </div>
    <div class="mt-3 flex gap-2">
      <button id="startBtn" class="px-3 py-2 bg-green-600 text-white rounded">Start</button>
      <button id="callBtn" class="px-3 py-2 bg-blue-600 text-white rounded">Call</button>
      <button id="hangupBtn" class="px-3 py-2 bg-red-600 text-white rounded">Hang Up</button>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
  <script>
    const socket = io(location.origin, { transports: ['websocket'] });
    const me = parseInt(localStorage.getItem('id_nguoi_dung'));
    const other = parseInt(new URLSearchParams(location.search).get('other'));

    let pc = null; let localStream = null;

    async function startLocal(){
      localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      document.getElementById('localVideo').srcObject = localStream;
    }

    const ICE_SERVERS = {{ ice_servers|safe }};
    function createPeer(){
      pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
      if(localStream) localStream.getTracks().forEach(t=>pc.addTrack(t, localStream));
      pc.ontrack = e => { document.getElementById('remoteVideo').srcObject = e.streams[0]; };
      pc.onicecandidate = e => { if(e.candidate) socket.emit('webrtc_ice', { from: me, to: other, candidate: e.candidate }); };
    }

    socket.on(`webrtc_offer_${me}`, async (data)=>{
      if(!pc) createPeer();
      await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      socket.emit('webrtc_answer', { from: me, to: data.from, sdp: pc.localDescription });
    });

    socket.on(`webrtc_answer_${me}`, async (data)=>{
      if(pc) await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
    });

    socket.on(`webrtc_ice_${me}`, async (data)=>{
      try{ if(pc && data.candidate) await pc.addIceCandidate(data.candidate); }catch(e){}
    });

    document.getElementById('startBtn').addEventListener('click', async ()=>{ await startLocal(); alert('Local media started'); });
    document.getElementById('callBtn').addEventListener('click', async ()=>{
      if(!other) return alert('Specify other user id in ?other=');
      createPeer();
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      socket.emit('webrtc_offer', { from: me, to: other, sdp: pc.localDescription });
    });
    document.getElementById('hangupBtn').addEventListener('click', ()=>{ if(pc){ pc.close(); pc=null; } if(localStream){ localStream.getTracks().forEach(t=>t.stop()); localStream=null; } });
  </script>
</body>
</html>
