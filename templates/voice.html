<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Assistant</title>
    <style>
        body {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1E90FF 0%, #00BFFF 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        /* Animated background particles */
        
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%,
            100% {
                transform: translateY(0px) rotate(0deg);
                opacity: 0.3;
            }
            50% {
                transform: translateY(-20px) rotate(180deg);
                opacity: 0.8;
            }
        }
        /* Navbar */
        
        .navbar {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .nav-left,
        .nav-right {
            flex: 1;
        }
        
        .nav-left {
            display: flex;
            justify-content: flex-start;
        }
        
        .nav-right {
            display: flex;
            justify-content: flex-end;
        }

        .notification-panel {
            position: absolute;
            top: 70px;
            right: 20px;
            width: 320px;
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(148, 163, 184, 0.25);
            border-radius: 18px;
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.15);
            padding: 16px;
            z-index: 20;
        }
        .hidden {
            display: none !important;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-weight: 700;
            color: #0f172a;
        }

        .notification-items {
            max-height: 250px;
            overflow-y: auto;
            display: grid;
            gap: 10px;
        }

        .notification-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            min-width: 18px;
            height: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            background: #ef4444;
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0 6px;
        }

        .notification-item {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 12px;
            color: #334155;
            font-size: 0.95rem;
        }

        .notification-title {
            font-weight: 700;
            margin-bottom: 4px;
            color: #0f172a;
        }

        .notification-message {
            font-size: 0.9rem;
            color: #475569;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
        }
        
        .home-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        .home-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .user-icon {
            font-size: 1.2rem;
        }
        
        .username {
            color: white;
            font-weight: 500;
            font-size: 0.9rem;
        }
        
        .logout-btn {
            background: rgba(255, 69, 69, 0.8);
            border: none;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            margin-left: 0.5rem;
            transition: all 0.3s ease;
        }
        
        .logout-btn:hover {
            background: rgba(255, 69, 69, 1);
            transform: translateY(-1px);
        }
        /* Main content */
        
        .main-content {
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 140px);
            padding: 2rem;
            text-align: center;
        }
        
        .hero-title {
            color: white;
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 1rem;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 1s ease-out;
        }
        
        .hero-subtitle {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.2rem;
            margin-bottom: 3rem;
            max-width: 600px;
            animation: fadeInUp 1s ease-out 0.2s both;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        /* Voice interaction area */
        
        .voice-container {
            position: relative;
            margin: 2rem 0;
        }
        
        .voice-button {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #ffffff 0%, #f0f8ff 100%);
            color: #1E90FF;
            font-size: 3rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
        }
        
        .voice-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }
        
        .voice-button.recording {
            background: linear-gradient(135deg, #FF4444 0%, #FF6666 100%);
            color: white;
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }
        /* Sound waves animation */
        
        .sound-waves {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            pointer-events: none;
        }
        
        .wave {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            opacity: 0;
        }
        
        .wave.active {
            animation: ripple 2s ease-out infinite;
        }
        
        @keyframes ripple {
            0% {
                width: 150px;
                height: 150px;
                opacity: 1;
            }
            100% {
                width: 300px;
                height: 300px;
                opacity: 0;
            }
        }
        /* Status display */
        
        .status-display {
            margin-top: 2rem;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .status-text {
            color: white;
            font-size: 1.1rem;
            margin-bottom: 1rem;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }
        
        .status-text.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        .response-area {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 1.5rem;
            max-width: 600px;
            margin-top: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }
        
        .response-area.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        .user-speech {
            color: #FFE4B5;
            font-style: italic;
            margin-bottom: 1rem;
        }
        
        .ai-response {
            color: #98FB98;
            font-weight: 500;
        }
        /* Button text */
        
        .button-text {
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 0.9rem;
            font-weight: 500;
            opacity: 0.8;
        }
        /* Footer */
        
        .footer {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 1rem;
            color: rgba(255, 255, 255, 0.7);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }
        /* Responsive design */
        
        @media (max-width: 768px) {
            .navbar {
                padding: 1rem;
            }
            .home-btn,
            .user-info {
                font-size: 0.8rem;
                padding: 0.4rem 0.8rem;
            }
            .logo {
                font-size: 1.2rem;
            }
            .hero-title {
                font-size: 2rem;
            }
            .hero-subtitle {
                font-size: 1rem;
                padding: 0 1rem;
            }
            .voice-button {
                width: 120px;
                height: 120px;
                font-size: 2.5rem;
            }
            .response-area {
                margin: 1rem;
                padding: 1rem;
            }
        }
        /* Loading animation */
        
        .loading-dots {
            display: inline-flex;
            gap: 4px;
        }
        
        .loading-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: loadingDots 1.4s ease-in-out infinite both;
        }
        
        .loading-dots span:nth-child(1) {
            animation-delay: -0.32s;
        }
        
        .loading-dots span:nth-child(2) {
            animation-delay: -0.16s;
        }
        
        @keyframes loadingDots {
            0%,
            80%,
            100% {
                transform: scale(0);
                opacity: 0.5;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <!-- Main content -->
    <main class="main-content">

    <!-- Footer -->
    <footer class="footer">

    </footer>

    <script>
        // Create floating particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 50;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 6 + 's';
                particle.style.animationDuration = (Math.random() * 3 + 3) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        // Voice interaction logic
        class VoiceAssistant {
            constructor() {
                this.isRecording = false;
                this.voiceButton = document.getElementById('voiceButton');
                this.micIcon = document.getElementById('micIcon');
                this.buttonText = document.getElementById('buttonText');
                this.statusText = document.getElementById('statusText');
                this.responseArea = document.getElementById('responseArea');
                this.userSpeech = document.getElementById('userSpeech');
                this.aiResponse = document.getElementById('aiResponse');
                this.waves = document.querySelectorAll('.wave');

                this.init();
            }

            init() {
                this.voiceButton.addEventListener('click', () => this.toggleRecording());
                createParticles();
            }

            toggleRecording() {
                if (!this.isRecording) {
                    this.startRecording();
                } else {
                    this.stopRecording();
                }
            }

            startRecording() {
                this.isRecording = true;
                this.voiceButton.classList.add('recording');
                this.micIcon.textContent = '⏹️';
                this.buttonText.textContent = 'Stop Recording';
                this.showStatus('Listening...');
                this.startSoundWaves();

                const id_nguoi_dung = localStorage.getItem("id_nguoi_dung"); // 🔹 lấy id_nguoi_dung
                fetch("/start_record", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                            id_nguoi_dung: id_nguoi_dung
                        }) // 🔹 gửi id_nguoi_dung
                });
            }

            stopRecording() {
                this.isRecording = false;
                this.voiceButton.classList.remove('recording');
                this.micIcon.textContent = '🎤';
                this.buttonText.textContent = 'Tap to Speak';
                this.stopSoundWaves();
                this.showStatus('Processing...');

                const id_nguoi_dung = localStorage.getItem("id_nguoi_dung"); // 🔹 lấy id_nguoi_dung
                fetch("/stop_record", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                                id_nguoi_dung: id_nguoi_dung
                            }) // 🔹 gửi id_nguoi_dung
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (data.status === "ok") {
                            this.userSpeech.textContent = `Bạn nói: "${data.user_text}"`;
                            this.aiResponse.textContent = `AI: "${data.bot_reply}"`;
                            this.responseArea.classList.add("show");
                            this.hideStatus();
                            if (data.streak && data.streak.success) {
                                if (data.streak.reward_given && data.streak.reward && data.streak.reward.length) {
                                    const card = data.streak.reward[0];
                                    addVoiceNotification({
                                        title: '🎉 Nhận flashcard',
                                        message: `Bạn đã đạt 100 điểm streak và được tặng flashcard: ${card.en} - ${card.vn}`,
                                        type: 'streak'
                                    });
                                } else {
                                    addVoiceNotification({
                                        title: '✨ Điểm streak',
                                        message: `Bạn vừa nhận +10 điểm streak. Tổng hiện tại: ${data.streak.streak_points}`,
                                        type: 'streak'
                                    });
                                }
                            }
                        } else {
                            this.showStatus("❌ " + data.message);
                        }
                    });
            }

            startSoundWaves() {
                this.waves.forEach((wave, index) => {
                    setTimeout(() => {
                        wave.classList.add('active');
                    }, index * 300);
                });
            }

            stopSoundWaves() {
                this.waves.forEach(wave => {
                    wave.classList.remove('active');
                });
            }

            showStatus(text) {
                this.statusText.innerHTML = text;
                this.statusText.classList.add('show');
            }

            hideStatus() {
                this.statusText.classList.remove('show');
            }
        }

        // Initialize the voice assistant
        document.addEventListener('DOMContentLoaded', () => {
            new VoiceAssistant();

            // Check login status
            const username = localStorage.getItem("ten_dang_nhap");
            const role = localStorage.getItem("vai_tro");
            const id_nguoi_dung = localStorage.getItem("id_nguoi_dung"); // 🔹 lấy id_nguoi_dung từ localStorage
            // Load avatar từ localStorage
            const savedAvatar = localStorage.getItem("avatar");
            if (savedAvatar) {
                document.getElementById("voiceAvatar").src = savedAvatar;
            }


            if (!id_nguoi_dung) {
                alert("❌ Bạn chưa đăng nhập. Vui lòng login trước khi sử dụng tính năng này.");
                window.location.href = "/"; // quay về trang login
                return;
            }

            // Nếu đã login, hiển thị username
            document.getElementById("usernameDisplay").textContent = username;
            loadVoiceNotifications();
            // Auto-refresh notifications every 5 seconds
            setInterval(loadVoiceNotifications, 5000);
            // initialize socket.io for WebRTC signaling
            if (window.io) {
                window.socket = io();
                const uid = parseInt(localStorage.getItem('id_nguoi_dung')||0);
                if(uid) socket.emit('register_user_socket', { user_id: uid });
                socket.on('webrtc_offer', (d) => {
                    // notify user about incoming call
                    const accept = confirm('Incoming call from user ' + (d.caller_id || 'unknown') + '. Accept?');
                    if(!accept) return;
                    // attach to a simple handler: place offer on window for VoiceAssistant to pick up
                    window.__incoming_offer = d;
                    window.dispatchEvent(new Event('incoming_call'));
                });
                socket.on('webrtc_answer', (d) => {
                    window.dispatchEvent(new CustomEvent('webrtc_answer', { detail: d }));
                });
                socket.on('webrtc_ice_candidate', (d) => {
                    window.dispatchEvent(new CustomEvent('webrtc_ice_candidate', { detail: d }));
                });
            }
        });

        // Expose simple call API for VoiceAssistant to use
        window.startCall = async function(caller_id, callee_id){
            // create call record
            const res = await fetch('/api/calls/start', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ caller_id, callee_id }) });
            const d = await res.json();
            return d;
        }

        window.endCallAndUpload = async function(id_call, blob){
            const fd = new FormData();
            fd.append('file', blob, `call_${id_call}.webm`);
            fd.append('id_call', id_call);
            const res = await fetch('/api/calls/upload_recording', { method:'POST', body: fd });
            return await res.json();
        }

                // --- Simple WebRTC call UI & logic ---
                (function(){
                    const container = document.createElement('div');
                    container.style.position='fixed'; container.style.right='12px'; container.style.bottom='12px'; container.style.zIndex=9999;
                    container.innerHTML = `<div class="p-3 bg-white rounded shadow flex gap-2 items-center"><input id="calleeIdInput" placeholder="Callee id" class="p-2 border rounded"/><button id="callBtn" class="px-3 py-2 bg-green-600 text-white rounded">Call</button><button id="hangupBtn" class="px-3 py-2 bg-red-600 text-white rounded">Hangup</button></div>`;
                    document.body.appendChild(container);
                    let pc = null; let localStream = null; let recorder = null; let recordedChunks = [];

                    async function createPeerConnection(targetId){
                        pc = new RTCPeerConnection();
                        pc.onicecandidate = (e)=>{ if(e.candidate){ socket && socket.emit('webrtc_ice_candidate', { target_id: targetId, candidate: e.candidate, from: parseInt(localStorage.getItem('id_nguoi_dung')||0) }); }};
                        pc.ontrack = (e)=>{
                            let el = document.getElementById('remoteAudio');
                            if(!el){ el = document.createElement('audio'); el.id='remoteAudio'; el.autoplay=true; el.controls=true; document.body.appendChild(el); }
                            el.srcObject = e.streams[0];
                            try{ recorder = new MediaRecorder(e.streams[0]); recordedChunks=[]; recorder.ondataavailable = ev=>{ if(ev.data.size) recordedChunks.push(ev.data); }; recorder.start(); }catch(err){}
                        };
                        return pc;
                    }

                        document.getElementById('callBtn').addEventListener('click', async ()=>{

        async function loadVoiceNotifications() {
            const id_nguoi_dung = localStorage.getItem('id_nguoi_dung');
            if (!id_nguoi_dung) return;
            try {
                const res = await fetch(`/api/user/notifications/${parseInt(id_nguoi_dung)}`);
                const data = await res.json();
                const list = document.getElementById('voiceNotificationList');
                const badge = document.getElementById('voiceNotificationBadge');
                const seen = localStorage.getItem('voiceNotificationsSeen') === 'true';
                if (data.status === 'success') {
                    const items = data.notifications || [];
                    if (items.length && !seen) {
                        badge.textContent = items.length;
                        badge.classList.remove('hidden');
                    } else {
                        badge.classList.add('hidden');
                    }
                    if (!items.length) {
                        list.innerHTML = '<div class="notification-item">Không có thông báo mới.</div>';
                        return;
                    }
                    list.innerHTML = items.map(item => `
                        <div class="notification-item">
                            <div class="notification-title">${item.title}</div>
                            <div class="notification-message">${item.message}</div>
                        </div>
                    `).join('');
                } else {
                    badge.classList.add('hidden');
                    list.innerHTML = '<div class="notification-item">Không tải được thông báo.</div>';
                }
            } catch (err) {
                console.error('Lỗi tải thông báo voice:', err);
                document.getElementById('voiceNotificationList').innerHTML = '<div class="notification-item">Lỗi tải thông báo.</div>';
            }
        }

        function addVoiceNotification(notification) {
            const list = document.getElementById('voiceNotificationList');
            const badge = document.getElementById('voiceNotificationBadge');
            if (!list || !badge) return;
            const itemHtml = `
                <div class="notification-item">
                    <div class="notification-title">${notification.title}</div>
                    <div class="notification-message">${notification.message}</div>
                </div>
            `;
            list.insertAdjacentHTML('afterbegin', itemHtml);
            badge.textContent = '1';
            badge.classList.remove('hidden');
            localStorage.setItem('voiceNotificationsSeen', 'false');
        }

        function playVoiceAudio(url) {
            if (!url) return;
            const player = document.createElement('audio');
            player.src = url;
            player.controls = true;
            player.autoplay = true;
            player.style.display = 'none';
            document.body.appendChild(player);
            player.addEventListener('ended', () => player.remove());
            player.addEventListener('error', () => {
                alert('Không thể phát audio. Vui lòng thử lại sau.');
                player.remove();
            });
        }

        const voiceNotificationBtn = document.getElementById('voiceNotificationBtn');
        const closeVoiceNotificationBtn = document.getElementById('closeVoiceNotificationBtn');
        const voiceHistoryBtn = document.getElementById('voiceHistoryBtn');
        const closeVoiceHistoryBtn = document.getElementById('closeVoiceHistoryBtn');

        if (voiceNotificationBtn) {
            voiceNotificationBtn.addEventListener('click', () => {
                const panel = document.getElementById('voiceNotificationPanel');
                if (!panel) return;
                panel.classList.toggle('hidden');
                if (!panel.classList.contains('hidden')) {
                    localStorage.setItem('voiceNotificationsSeen', 'true');
                    const badge = document.getElementById('voiceNotificationBadge');
                    if (badge) badge.classList.add('hidden');
                }
            });
        }

        if (closeVoiceNotificationBtn) {
            closeVoiceNotificationBtn.addEventListener('click', () => {
                const panel = document.getElementById('voiceNotificationPanel');
                if (panel) panel.classList.add('hidden');
            });
        }

        if (voiceHistoryBtn) {
            voiceHistoryBtn.addEventListener('click', () => {
                const panel = document.getElementById('voiceHistoryPanel');
                if (!panel) return;
                panel.classList.toggle('hidden');
                if (!panel.classList.contains('hidden')) {
                    loadVoiceHistory();
                }
            });
        }

        if (closeVoiceHistoryBtn) {
            closeVoiceHistoryBtn.addEventListener('click', () => {
                const panel = document.getElementById('voiceHistoryPanel');
                if (panel) panel.classList.add('hidden');
                toggleEditVoice(false);
            });
        }

        async function loadVoiceHistory() {
            const id_nguoi_dung = localStorage.getItem('id_nguoi_dung');
            if (!id_nguoi_dung) return;
            try {
                const res = await fetch(`/api/user/ai_voice_history/${parseInt(id_nguoi_dung)}`);
                const data = await res.json();
                const list = document.getElementById('voiceHistoryList');
                if (data.status === 'success' && Array.isArray(data.history) ) {
                    if (!data.history.length) {
                        list.innerHTML = '<div class="notification-item">Chưa có lịch sử thoại nào.</div>';
                        return;
                    }
                    list.innerHTML = data.history.map(item => `
                        <div class="notification-item">
                            <div class="notification-title">${item.timestamp || '---'}</div>
                            <div class="notification-message"><strong>Bạn:</strong> ${item.user || item.tro_chuyen_user || item.message || '...'}</div>
                            <div class="notification-message"><strong>AI:</strong> ${item.ai || item.tro_chuyen_ai || item.response || '...'}</div>
                            ${item.audio_url ? `
                                <div class="notification-message" style="margin-top:0.75rem;">
                                    <audio controls src="${item.audio_url}" style="width:100%; max-width:100%;"></audio>
                                    <button onclick="playVoiceAudio('${item.audio_url}')" class="logout-btn" style="margin-top:0.5rem;">Nghe lại</button>
                                </div>
                            ` : '<div class="notification-message text-sm text-slate-500">Không có audio.</div>'}
                        </div>
                    `).join('');
                } else {
                    list.innerHTML = '<div class="notification-item">Không tải được lịch sử thoại.</div>';
                }
            } catch (err) {
                console.error('Lỗi tải lịch sử thoại:', err);
                document.getElementById('voiceHistoryList').innerHTML = '<div class="notification-item">Lỗi tải lịch sử thoại.</div>';
            }
        }

        // Delete voice history
        async function deleteVoiceHistory() {
            if (!confirm('Bạn có chắc muốn xóa toàn bộ lịch sử thoại?')) return;
            const id = localStorage.getItem('id_nguoi_dung');
            const res = await fetch(`/api/user/ai_voice_history/${parseInt(id)}`, { method: 'DELETE' });
            const data = await res.json();
            if (data.status === 'success') {
                document.getElementById('voiceHistoryList').innerHTML = '<div class="notification-item">Đã xóa lịch sử.</div>';
            } else alert('Xóa thất bại');
        }

        // Edit voice history
        function toggleEditVoice(show) {
            const area = document.getElementById('voiceHistoryEditArea');
            if (show === undefined) show = area.classList.contains('hidden');
            if (show) {
                area.classList.remove('hidden');
                loadVoiceHistoryForEdit();
            } else {
                area.classList.add('hidden');
            }
        }

        async function loadVoiceHistoryForEdit() {
            const id = localStorage.getItem('id_nguoi_dung');
            const res = await fetch(`/api/user/ai_voice_history/${parseInt(id)}`);
            const data = await res.json();
            const editor = document.getElementById('voiceHistoryJsonEditor');
            if (data.status === 'success') editor.value = JSON.stringify(data.history || [], null, 2);
            else editor.value = '[]';
        }

        async function saveEditedVoiceHistory() {
            const id = localStorage.getItem('id_nguoi_dung');
            const editor = document.getElementById('voiceHistoryJsonEditor');
            try {
                const parsed = JSON.parse(editor.value || '[]');
                const res = await fetch(`/api/user/ai_voice_history/${parseInt(id)}`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({history: parsed}) });
                const data = await res.json();
                if (data.status === 'success') {
                    alert('Lưu thành công');
                    toggleEditVoice(false);
                    loadVoiceHistory();
                } else alert('Lưu thất bại');
            } catch (err) { alert('JSON không hợp lệ'); }
        }

        document.getElementById('deleteVoiceHistoryBtn').addEventListener('click', deleteVoiceHistory);
        document.getElementById('editVoiceHistoryBtn').addEventListener('click', () => toggleEditVoice(true));
        document.getElementById('cancelEditVoiceBtn').addEventListener('click', () => toggleEditVoice(false));
        document.getElementById('saveEditVoiceBtn').addEventListener('click', saveEditedVoiceHistory);
        document.getElementById('refreshCallsBtn').addEventListener('click', loadUserCalls);

        async function loadUserCalls(){
            const id = localStorage.getItem('id_nguoi_dung'); if(!id) return;
            const el = document.getElementById('callList'); el.innerHTML = '<div class="notification-item">Đang tải...</div>';
            try{
                const res = await fetch(`/api/calls/user/${parseInt(id)}`);
                const j = await res.json(); if(j.status !== 'success'){ el.innerHTML = '<div class="notification-item">Lỗi tải cuộc gọi.</div>'; return; }
                const calls = j.calls || [];
                if(!calls.length){ el.innerHTML = '<div class="notification-item">Chưa có cuộc gọi.</div>'; return; }
                el.innerHTML = calls.map(c=>{
                    const started = c.created_at || c.started_at || '';
                    const other = (c.caller_id == id) ? c.callee_id : c.caller_id;
                    const recording = c.recording_url || c.recording || '';
                    return `<div class="notification-item"><div class="notification-title">${started} — Với: ${other}</div><div class="notification-message">Trạng thái: ${c.status||'n/a'}</div>`+
                        (recording? `<div style="margin-top:8px"><audio controls src="${recording}" style="width:100%"></audio><div style="margin-top:6px"><a href="${recording}" target="_blank" class="logout-btn">Tải về</a></div></div>` : `<div class="notification-message text-sm text-slate-500">Không có bản ghi</div>`) + `</div>`;
                }).join('');
            }catch(err){ console.error(err); el.innerHTML = '<div class="notification-item">Lỗi khi tải cuộc gọi.</div>'; }
        }

        // Xử lý home button
        document.getElementById("homeBtn").addEventListener("click", () => {
            window.location.href = "/home";
        });

        // Xử lý logout
        document.getElementById("logoutBtn").addEventListener("click", () => {
            localStorage.clear();
            window.location.href = "/";
        });
    </script>
