<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đổi mật khẩu - AI Learning Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        
        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 50%, #0369a1 100%);
        }
    </style>
</head>

<body class="min-h-screen gradient-bg flex items-center justify-center px-4">

    <div class="bg-white w-full max-w-md rounded-2xl p-8 shadow-xl fade-in">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">🔐 Đổi mật khẩu</h2>

        <div class="space-y-4">
            <input id="oldPassword" type="password" placeholder="Mật khẩu hiện tại" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-400">

            <input id="newPassword" type="password" placeholder="Mật khẩu mới" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-400">

            <input id="confirmPassword" type="password" placeholder="Nhập lại mật khẩu mới" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-400">
        </div>

        <button onclick="changePassword()" class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-semibold transition">
            Cập nhật mật khẩu
        </button>

        <button onclick="window.location.href='/profile'" class="w-full mt-3 bg-gray-200 hover:bg-gray-300 text-gray-700 py-3 rounded-xl transition">
            ← Quay lại trang cá nhân
        </button>
    </div>

    <script>
        async function changePassword() {
            const oldPw = document.getElementById("oldPassword").value;
            const newPw = document.getElementById("newPassword").value;
            const confirmPw = document.getElementById("confirmPassword").value;

            const email = localStorage.getItem("email");

            if (!email) {
                alert("❌ Bạn chưa đăng nhập!");
                window.location.href = "/login";
                return;
            }

            if (!oldPw || !newPw || !confirmPw) {
                alert("Vui lòng nhập đầy đủ thông tin");
                return;
            }

            if (newPw !== confirmPw) {
                alert("Mật khẩu nhập lại không trùng khớp!");
                return;
            }

            const res = await fetch("/change_password", {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    email: email,
                    old_mat_khau: oldPw,
                    new_mat_khau: newPw
                })
            });

            const data = await res.json();

            if (data.status === "success") {
                alert("✅ Đổi mật khẩu thành công!");
                window.location.href = "/profile";
            } else {
                alert(data.message || "Không thể đổi mật khẩu!");
            }
        }
    </script>

</body>

</html>
