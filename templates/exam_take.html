<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Làm bài kiểm tra - AI Learning Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-slate-50 via-white to-indigo-50 min-h-screen text-slate-800">
    <header class="bg-white/80 backdrop-blur border-b border-slate-200 sticky top-0 z-10 shadow-sm">
        <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between gap-3">
            <div class="flex items-center gap-3">
                <div class="h-10 w-10 rounded-xl bg-indigo-600 text-white flex items-center justify-center font-semibold">AI</div>
                <div>
                    <p class="text-xs uppercase tracking-[0.25em] text-slate-500">Exam Center</p>
                    <p class="font-semibold text-slate-900">Chọn & làm bài kiểm tra</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button id="homeBtn" class="px-4 py-2 rounded-lg bg-slate-100 text-slate-700 hover:bg-slate-200 transition text-sm">Trang chủ</button>
                <button id="logoutBtn" class="px-4 py-2 rounded-lg bg-rose-500 text-white hover:bg-rose-600 transition text-sm">Đăng xuất</button>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8 space-y-6">
        <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 flex flex-col gap-3">
            <div class="flex items-start justify-between gap-4">
                <div>
                    <p class="text-sm text-indigo-600 font-semibold">Xin chào, <span id="usernameDisplay" class="font-semibold text-slate-900">User</span></p>
                    <h1 class="text-3xl font-bold text-slate-900">Bài kiểm tra</h1>
                    <p class="text-slate-500">Chọn một bài kiểm tra để bắt đầu làm.</p>
                </div>
                <div class="px-3 py-2 rounded-xl bg-indigo-50 text-indigo-700 text-sm font-semibold">Sẵn sàng thi</div>
            </div>
            <div class="flex flex-wrap gap-2 text-sm text-slate-600">
                <span class="px-3 py-1.5 rounded-full bg-slate-100">Lưu tiến độ tức thì</span>
                <span class="px-3 py-1.5 rounded-full bg-slate-100">Hỗ trợ trắc nghiệm & tự luận</span>
                <span class="px-3 py-1.5 rounded-full bg-slate-100">Giao diện gọn gàng</span>
            </div>
        </section>

        <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 space-y-4">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-sm text-blue-600 font-semibold">Danh sách bài kiểm tra</p>
                    <h2 class="text-xl font-bold text-slate-900">Chọn đề để làm</h2>
                </div>
                <button id="reloadListBtn" class="px-3 py-2 bg-slate-100 text-slate-700 rounded-lg hover:bg-slate-200 text-sm transition">
                  Tải lại
                </button>
            </div>

            <p id="listStatus" class="text-sm text-slate-500"></p>
            <div id="examList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>

            <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 space-y-5"></section>
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-sm text-purple-600 font-semibold">Đề đang làm</p>
                    <h2 class="text-xl font-bold text-slate-900">Nội dung bài kiểm tra</h2>
                </div>
                <button id="submitExamBtn" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 shadow-sm transition">Nộp bài</button>
            </div>

            <div id="examInfo" class="text-sm text-slate-600">Chưa chọn bài kiểm tra.</div>
            <div id="examContent" class="space-y-4 max-h-[520px] overflow-y-auto pr-2"></div>

            <div class="flex items-center justify-between">
                <p id="submitStatus" class="text-sm text-slate-500"></p>
            </div>
        </section>
    </main>

    <script>
        let currentExam = null;
        let userId = null;

        function ensureAuth() {
            const storedId = localStorage.getItem("id_nguoi_dung");
            const storedName = localStorage.getItem("ten_dang_nhap");
            if (!storedId || !storedName) {
                alert("Vui lòng đăng nhập để tiếp tục");
                window.location.href = "/login";
                return;
            }
            userId = parseInt(storedId, 10);
            document.getElementById("usernameDisplay").textContent = storedName;
        }

        function renderExam(exam) {
            const infoEl = document.getElementById("examInfo");
            const contentEl = document.getElementById("examContent");

            if (!exam) {
                infoEl.textContent = "Chưa chọn bài kiểm tra.";
                contentEl.innerHTML = "";
                return;
            }

            infoEl.innerHTML = `
    <p class="font-semibold text-slate-800">${exam.tieu_de}</p>
    <p class="text-slate-500">${exam.mo_ta || ""}</p>
    <p class="text-sm text-slate-500 mt-2">Thời lượng: ${exam.thoi_luong || 60} phút · Phần thi: ${exam.cau_hoi && exam.cau_hoi.length ? [...new Set(exam.cau_hoi.map(q => q.phan_thi || "reading"))].join(", ") : "-"}</p>
  `;

            contentEl.innerHTML = "";

            (exam.cau_hoi || []).forEach((q, idx) => {
                        const card = document.createElement("div");
                        card.className = "border border-slate-200 rounded-xl p-4 bg-slate-50";

                        const loai = (q.loai_cau_hoi || "").toLowerCase();

                        let answerHtml = "";

                        if (loai === "tu_luan") {
                            // ✅ tự luận: textbox
                            answerHtml = `
        <textarea
          name="essay-${q.id_cauhoi}"
          placeholder="Nhập câu trả lời..."
          class="w-full min-h-[96px] rounded-lg border border-slate-200 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white"
        ></textarea>
        <p class="text-xs text-slate-500 mt-2">* Trả lời ngắn gọn, đúng ý.</p>
      `;
                        } else {
                            // ✅ trắc nghiệm: radio (chọn 1)
                            answerHtml = `
        <div class="mt-3 space-y-2">
          ${(q.dap_an || []).map(ans => `
            <label class="flex items-center gap-2 text-sm text-slate-800">
              <input type="radio" name="q-${q.id_cauhoi}" value="${ans.id_dapan}"
                     class="h-4 w-4 text-indigo-600" />
              <span>${ans.noi_dung}</span>
            </label>
          `).join("")}
        </div>
      `;
    }

    card.innerHTML = `
      <div class="flex items-start justify-between gap-3">
        <div>
          <p class="text-sm text-slate-500">Câu ${idx + 1} · ${q.muc_do || ""} · ${(q.phan_thi || "reading").charAt(0).toUpperCase() + (q.phan_thi || "reading").slice(1)}</p>
          <p class="font-medium text-slate-900">${q.noi_dung}</p>
        </div>
        <span class="text-xs bg-slate-200 text-slate-700 px-2 py-1 rounded">${q.loai_cau_hoi}</span>
      </div>
      <div class="mt-3">${answerHtml}</div>
    `;

    contentEl.appendChild(card);
  });
}


    async function fetchExamList() {
      const statusEl = document.getElementById("listStatus");
      const listEl = document.getElementById("examList");

      statusEl.textContent = "Đang tải danh sách...";
      listEl.innerHTML = "";

      try {
        const res = await fetch("/exams/list");
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || "Không thể tải danh sách");

        const exams = data.exams || [];
        if (exams.length === 0) {
          statusEl.textContent = "Chưa có bài kiểm tra nào.";
          return;
        }

        statusEl.textContent = `Có ${exams.length} bài kiểm tra.`;
        exams.forEach(ex => {
          const card = document.createElement("div");
          card.className = "border border-slate-200 rounded-2xl p-4 bg-white hover:shadow-sm transition";
          card.innerHTML = `
            <div class="space-y-2">
              <div class="flex items-start justify-between gap-3">
                <div>
                  <p class="font-semibold text-slate-900">${ex.tieu_de || "Không có tiêu đề"}</p>
                  <p class="text-sm text-slate-500">${ex.mo_ta || ""}</p>
                </div>
                <div class="text-right">
                  <div class="text-xs text-slate-500">${ex.so_cau || 0} câu</div>
                  <div class="text-xs text-slate-500">${ex.thoi_luong || 60} phút</div>
                </div>
              </div>
              <div class="flex items-center justify-between pt-2">
                <p class="text-xs text-slate-500">Ngày tạo: ${ex.ngay_tao || "-"}</p>
                <button class="px-3 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 text-sm"
                        data-exam-id="${ex.id_kt}">
                  Làm bài
                </button>
              </div>
            </div>
          `;
          listEl.appendChild(card);
        });

        // gắn click cho các nút Làm bài
        listEl.querySelectorAll("button[data-exam-id]").forEach(btn => {
          btn.addEventListener("click", async () => {
            const examId = btn.getAttribute("data-exam-id");
            await loadExamById(examId);
          });
        });

      } catch (err) {
        statusEl.textContent = `❌ ${err.message}`;
      }
    }

    async function loadExamById(examId) {
      const submitStatus = document.getElementById("submitStatus");
      submitStatus.textContent = "Đang tải đề...";

      try {
        const res = await fetch(`/exams/${examId}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || "Không tìm thấy bài kiểm tra");

        currentExam = data.exam;
        renderExam(currentExam);
        submitStatus.textContent = "Đã tải đề. Hãy bắt đầu làm bài!";
        window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
      } catch (err) {
        submitStatus.textContent = `❌ ${err.message}`;
        currentExam = null;
        renderExam(null);
      }
    }

    async function submitExam() {
  const statusEl = document.getElementById("submitStatus");
  if (!currentExam) {
    statusEl.textContent = "❌ Vui lòng chọn bài kiểm tra trước";
    return;
  }

  const baiLam = (currentExam.cau_hoi || []).map(q => {
    const loai = (q.loai_cau_hoi || "").toLowerCase();

    if (loai === "tu_luan") {
      const txt = document.querySelector(`textarea[name='essay-${q.id_cauhoi}']`);
      const traLoi = (txt ? txt.value : "").trim();
      return {
        id_cauhoi: q.id_cauhoi,
        tra_loi_tu_luan: traLoi
      };
    }

    // trac_nghiem
    const selected = Array.from(
      document.querySelectorAll(`input[name='q-${q.id_cauhoi}']:checked`)
    ).map(el => parseInt(el.value, 10));

    return {
      id_cauhoi: q.id_cauhoi,
      dap_an_da_chon: selected
    };
  });

  statusEl.textContent = "Đang nộp bài...";
  try {
    const res = await fetch("/exam/submit", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id_nguoi_dung: userId, id_kt: currentExam.id_kt, bai_lam: baiLam })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.message || "Không thể lưu kết quả");

    if (data.status === "pending") {
      statusEl.textContent = `✅ Bài đã nộp thành công. Hệ thống sẽ chấm điểm sau khoảng 15 phút.`;
    } else if (data.status === "success") {
      statusEl.textContent = `🎉 Điểm: ${data.diem || 0}`;
    } else {
      statusEl.textContent = data.message || "✅ Đã nộp bài. Vui lòng chờ chấm điểm.";
    }
  } catch (err) {
    statusEl.textContent = `❌ ${err.message}`;
  }
}


    document.getElementById("reloadListBtn").addEventListener("click", fetchExamList);
    document.getElementById("submitExamBtn").addEventListener("click", submitExam);
    document.getElementById("homeBtn").addEventListener("click", () => window.location.href = "/home");
    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.clear();
      window.location.href = "/login";
    });

    ensureAuth();
    fetchExamList();
    renderExam(null);
    </script>
</body>

</html>
