<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
  <div class="max-w-3xl mx-auto bg-white rounded p-4 shadow">
    <div class="flex items-center justify-between mb-4">
      <h2 id="title" class="text-lg font-semibold">Chat</h2>
      <div class="text-sm text-gray-500">You: <span id="me"></span></div>
    </div>

    <div id="messages" class="h-96 overflow-auto p-3 border rounded bg-gray-100 space-y-2"></div>

    <div class="mt-3 flex gap-2">
      <input id="inputMsg" class="flex-1 p-2 border rounded" placeholder="Type a message..." />
      <button id="sendBtn" class="px-3 py-2 bg-blue-600 text-white rounded">Send</button>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
  <script>
    const socket = io(location.origin, { transports: ['websocket'] });
    const me = parseInt(localStorage.getItem('id_nguoi_dung'));
    const other = {{ other_user_id|default(0) }};
    document.getElementById('me').textContent = me;
    document.getElementById('title').textContent = `Chat with ${other}`;

    function addMsg(text, who){
      const c = document.createElement('div');
      c.className = who === me ? 'text-right' : 'text-left';
      c.innerHTML = `<div class="inline-block p-2 rounded ${who===me? 'bg-blue-600 text-white':'bg-white'}">${text}</div>`;
      document.getElementById('messages').appendChild(c);
      document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }

    socket.on('connect', ()=> console.log('connected'));
    socket.on(`private_message_${me}`, payload => {
      addMsg(payload.content, payload.sender_id);
    });

    document.getElementById('sendBtn').addEventListener('click', async ()=>{
      const content = document.getElementById('inputMsg').value || '';
      if(!content.trim()) return;
      // send via HTTP to persist + emit
      const res = await fetch('/api/messages/send', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ sender_id: me, receiver_id: other, content }) });
      const j = await res.json();
      if(j.status === 'success'){
        addMsg(content, me);
        document.getElementById('inputMsg').value='';
      } else {
        alert(j.message || 'Failed to send');
      }
    });

    // load history
    async function loadHistory(){
      const res = await fetch(`/api/messages/history?user_a=${me}&user_b=${other}&limit=200`);
      const j = await res.json();
      if(j.status === 'success'){
        j.messages.forEach(m => addMsg(m.content, m.sender_id));
      }
    }

    loadHistory();
  </script>
</body>
</html>
